# Construit les installateurs + ZIP pour Windows x64, ARM64 et ia32, puis les attache à la release.
name: Release Windows builds

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build NSIS + ZIP (x64, arm64, ia32)
        run: npx electron-builder --win nsis zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts to this release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Geneaindex-*.exe
            dist/Geneaindex-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
